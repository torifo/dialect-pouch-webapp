# dialect-pocket 【オンプレ(仮)】向け compose。
#
# 方針(VPSとの違い): オンプレは接続先でのビルドを許可(例外)。共有proxyが無い前提で
# 同梱の NGINX(deploy/nginx.conf)を前段に置き、イメージも接続先で build する。
# ※ これは暫定構成。実際のオンプレ環境(TLS証明書・ドメイン・ネットワーク)に合わせて調整する。
#
# 使い方(オンプレ host, リポジトリを clone した上で):
#   1. SECRET_KEY_BASE 生成: mix phx.gen.secret
#   2. .env を用意:
#        APP_HOST=dialect-pocket.local
#        POSTGRES_PASSWORD=...
#        SECRET_KEY_BASE=...
#   3. ビルド&起動(接続先でビルド):
#        docker compose -f docker-compose.onprem.yml --env-file .env up -d --build
#   - TLS は暫定で未設定(HTTP)。証明書を使う場合は deploy/nginx.conf と nginx サービスの
#     ボリューム/ポートを調整する。

services:
  db:
    build:
      context: ./docker/postgres
    image: dialect-pocket-db:onprem
    container_name: dialect_pocket_db_onprem
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: dialect_pocket_prod
    volumes:
      - pgdata_onprem:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dialect_pocket_prod"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
    image: dialect-pocket-web:onprem
    container_name: dialect_pocket_app_onprem
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "ecto://postgres:${POSTGRES_PASSWORD}@db/dialect_pocket_prod"
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      PHX_HOST: ${APP_HOST:-dialect-pocket.local}
      PORT: "4000"
      POOL_SIZE: ${POOL_SIZE:-10}
    command: sh -c "/app/bin/migrate && /app/bin/server"
    networks:
      - internal

  nginx:
    image: nginx:1.29-alpine
    container_name: dialect_pocket_nginx_onprem
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      # TLS を使う場合は 443 を開け、証明書をマウントして deploy/nginx.conf を調整する。
      # - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal

networks:
  internal:

volumes:
  pgdata_onprem:
