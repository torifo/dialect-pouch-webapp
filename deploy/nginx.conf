# dialect-pocket NGINX reverse proxy (example)
#
# 前提:
#   - Phoenix(LiveView) アプリは upstream `app:4000`(docker-compose.prod.yml の app サービス)で待ち受ける。
#   - LiveView は WebSocket(/live)を使うため Upgrade ヘッダの転送が必須。
#   - TLS(https)はこの前段で終端する想定。本ファイルは平文(80)で app に渡す例。
#     実運用では certbot 等で証明書を取得し、443 の server ブロックを追加して
#     この location 群を再利用すること(下部コメント参照)。
#
# このファイルを docker-compose.prod.yml の nginx サービスに
#   ./deploy/nginx.conf:/etc/nginx/conf.d/dialect-pocket.conf:ro
# としてマウントする。

upstream dialect_pocket_app {
    server app:4000;
}

# gzip(LiveView の HTML/JS/CSS を圧縮)
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_types
    text/plain
    text/css
    text/xml
    application/javascript
    application/json
    application/xml
    image/svg+xml;

server {
    listen 80;
    listen [::]:80;
    server_name _;  # 実際のドメインに置き換える(例: dialect-pocket.example.com)

    # certbot(Let's Encrypt) の HTTP-01 チャレンジ用。TLS 導入時に有効化。
    # location /.well-known/acme-challenge/ {
    #     root /var/www/certbot;
    # }

    # 共通プロキシヘッダ
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # LiveView の WebSocket 接続(/live)
    location /live {
        proxy_pass http://dialect_pocket_app;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        # WebSocket は長時間張りっぱなしになるため read timeout を長めに取る
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # 通常の HTTP リクエスト(/, /search, /e/:slug, /regions, /r/:region_path,
    # /convert, /contribute, /admin/moderation, /sitemap.xml など)
    location / {
        proxy_pass http://dialect_pocket_app;
        proxy_read_timeout 120s;
    }
}

# --- TLS を終端する場合の追記例(certbot 等で証明書取得後) ---
#
# server {
#     listen 80;
#     server_name dialect-pocket.example.com;
#     return 301 https://$host$request_uri;   # http -> https リダイレクト
# }
#
# server {
#     listen 443 ssl;
#     listen [::]:443 ssl;
#     server_name dialect-pocket.example.com;
#
#     ssl_certificate     /etc/letsencrypt/live/dialect-pocket.example.com/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/dialect-pocket.example.com/privkey.pem;
#
#     # 上記の proxy_set_header / location /live / location / をここに複製する。
#     # アプリ側(config/runtime.exs)は X-Forwarded-Proto を見て https URL を生成する。
# }
