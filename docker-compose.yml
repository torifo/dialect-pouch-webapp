# Dev dependencies for dialect-pocket.
# Elixir/Phoenix run on the host (asdf); only PostgreSQL runs in Docker.
services:
  db:
    build:
      context: ./docker/postgres
    image: dialect-pocket-postgres:16-bigm
    container_name: dialect_pocket_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dialect_pocket_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
